let quiz = [];
let userAnswers = {};
let submitted = false;

function shuffle(array) {
  return array.sort(() => Math.random() - 0.5);
}

function startQuiz(num) {
  document.getElementById("menu").style.display = "none";
  document.getElementById("panel").style.display = "block";

  let shuffled = shuffle([...originalQuiz]);

  if (num === 280) {
    quiz = shuffled;
  } else {
    quiz = shuffled.slice(0, num);
  }

  userAnswers = {};
  submitted = false;
  document.getElementById("scoreBox").innerText = "";

  renderQuiz();
}

function renderQuiz() {
  let html = "";

  quiz.forEach((q, index) => {
    html += `<div class="question"><b>Câu ${index+1}: ${q.q}</b><br>`;

    ["A","B","C","D"].forEach(ans => {
      let mark = "";
      let className = "";

      if (submitted) {
        if (q.correct === ans) {
          mark = " ✔";
          className = "correct";
        }
        if (userAnswers[index] === ans && ans !== q.correct) {
          mark = " ✘";
          className = "wrong";
        }
      }

      html += `
        <label class="${className}">
          <input type="radio" name="q${index}" value="${ans}"
          ${userAnswers[index]===ans ? "checked":""}
          ${submitted ? "disabled":""}
          onclick="save(${index},'${ans}')">
          ${ans}. ${q[ans]} ${mark}
        </label><br>
      `;
    });

    html += "</div>";
  });

  document.getElementById("quiz").innerHTML = html;
}

function save(index, ans) {
  userAnswers[index] = ans;
}

function submitQuiz() {
  submitted = true;
  let score = 0;

  quiz.forEach((q, index) => {
    if (userAnswers[index] === q.correct) score++;
  });

  document.getElementById("scoreBox").innerHTML =
    "✅ Điểm: " + score + " / " + quiz.length;

  renderQuiz();
}

function restartQuiz() {
  location.reload(); // quay lại menu
}
