<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÔN THI A3-ĐĂKRE2</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #ffffff; color: #000; margin: 0; padding: 20px; line-height: 1.6; }
        .container { max-width: 1100px; margin: auto; text-align: center; }
        
        h2 { text-transform: uppercase; font-weight: bold; margin-top: 10px; }
        .status-online { margin-bottom: 10px; font-size: 14px; }

        /* Menu & Controls */
        .search-box { margin: 20px 0; }
        input[type="text"] { padding: 10px; width: 300px; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; }
        
        .menu-buttons button { 
            padding: 10px 25px; margin: 5px; cursor: pointer; 
            border: 1px solid #333; background: #fff; font-weight: bold;
            border-radius: 4px; transition: 0.2s;
        }
        .menu-buttons button:hover { background: #f0f0f0; }

        /* Leaderboard Layout */
        .leaderboard-flex { display: flex; justify-content: center; gap: 30px; margin-top: 30px; flex-wrap: wrap; }
        .bxh-card { 
            border: 1px solid #ddd; border-radius: 12px; 
            padding: 20px; width: 450px; background: #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .bxh-title { font-weight: bold; margin-bottom: 15px; font-size: 18px; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .bxh-title i { color: #f1c40f; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #eee; padding: 12px; text-align: center; }
        th { background-color: #f9f9f9; font-weight: bold; }

        /* Quiz UI */
        #quiz-area { display: none; text-align: left; background: #fff; padding: 30px; border-radius: 8px; border: 1px solid #ddd; }
        .top-nav { position: sticky; top: 0; background: #fff; padding: 15px 0; border-bottom: 2px solid #333; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .question-block { margin-bottom: 25px; padding: 15px; border-bottom: 1px solid #eee; }
        .ans-option { display: block; margin: 10px 0; cursor: pointer; padding: 5px; border-radius: 4px; }
        .ans-option:hover { background: #f8f8f8; }
        
        .correct-text { color: #27ae60; font-weight: bold; margin-top: 10px; }
        .wrong-text { color: #e74c3c; font-weight: bold; margin-top: 10px; }
        #final-result { font-size: 24px; font-weight: bold; text-align: center; margin-top: 30px; color: #2c3e50; }
    </style>
</head>
<body>

<div class="container" id="home-screen">
    <div class="status-online">🎥 <strong>Online: 1</strong></div>
    <h2>ÔN THI A3-ĐĂKRE2</h2>

    <div class="search-box">
        <input type="text" id="playerName" placeholder="Nhập tên thí sinh...">
    </div>

    <div class="menu-buttons">
        <button onclick="initQuiz(60)">📝 Làm 60 câu</button>
        <button onclick="initQuiz(allQuestions.length)">📚 Làm 343 câu</button>
        <button onclick="clearData()" style="color: #c0392b;">📝 Reset BXH</button>
    </div>

    <div class="leaderboard-flex">
        <div class="bxh-card">
            <div class="bxh-title">🏆 BXH 60 CÂU</div>
            <table>
                <thead><tr><th>Tên</th><th>Điểm</th></tr></thead>
                <tbody id="list-60"></tbody>
            </table>
        </div>

        <div class="bxh-card">
            <div class="bxh-title">🏆 BXH 343 CÂU</div>
            <table>
                <thead><tr><th>Tên</th><th>Điểm</th></tr></thead>
                <tbody id="list-343"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="quiz-area" class="container">
    <div class="top-nav">
        <h3 id="mode-label">ĐANG THI</h3>
        <div>
            <button onclick="finishQuiz()" style="background: #2ecc71; color: white; padding: 10px 20px; border: none; font-weight: bold; cursor: pointer;">📤 Nộp bài</button>
            <button onclick="goHome()" style="margin-left: 10px; padding: 10px 20px; cursor: pointer;">🏠 Thoát</button>
        </div>
    </div>
    <div id="questions-container"></div>
    <div id="final-result"></div>
</div>

<script>
// Toàn bộ mảng câu hỏi (Bạn có thể thêm tiếp vào đây)
const allQuestions = [
    { q: "Theo Thông tư 05/2025/TT-BCT: Tổ máy phát điện của nhà máy thủy điện và nhà máy nhiệt điện có tổng công suất lắp đặt từ 30 MW trở xuống đấu nối vào lưới điện phân phối phải có khả năng phát công suất tác dụng định mức liên tục trong dải tần số của hệ thống điện?",
     A: "48 Hz đến 50 Hz.", 
     B: "48 Hz đến 51 Hz.", 
     C: "49 Hz đến 50 Hz.", 
     D: "49 Hz đến 51 Hz.", 
     correct: "D" },
    { q: "Theo Thông tư 06/2025/TT-BCT: Điều khiển tần số thứ cấp nhằm duy trì tần số ở dải tần số làm việc cho phép nào?", 
     A: "50 +- 0,1 Hz", 
     B: "50 +- 0,5 Hz", 
     C: "50 +- 0,02 Hz", 
     D: "50 +- 0,2 Hz", 
     correct: "D" },
    { q: "Thiết bị rơle bảo vệ được sử dụng để:", 
     A: "Phát hiện sự cố.", 
     B: "Phát hiện sự cố và gửi tín hiệu đến MC.",
     C: "Tất cả đều sai.", 
     D: "Cắt dòng sự cố.", 
     correct: "B" },
    { q: "Theo Thông tư 06/2025/TT-BCT: Nếu không có quy định riêng, máy biến áp khô được phép quá tải ngắn hạn 30% trong bao lâu?",
     A: "100 phút.", 
     B: "80 phút.", 
     C: "45 phút.", 
     D: "60 phút.", 
     correct: "C" },
    { q: "Ký hiệu bảo vệ F51N trong rơle bảo vệ là:", 
     A: "Bảo vệ quá dòng pha có thời gian.", 
     B: "Bảo vệ quá dòng chạm đất có thời gian.", 
     C: "Bảo vệ quá áp thứ tự không.", 
     D: "Bảo vệ quá dòng cắt nhanh.", 
     correct: "B" },
    { q: "Trong hệ thống SCADA, giao thức IEC 61850 thường sử dụng loại bản tin nào để trao đổi thông tin bảo vệ tốc độ cao?", 
     A: "MMS", 
     B: "GOOSE", 
     C: "Modbus TCP",
     D: "DNP3", c
         orrect: "B" },
    { q: "Theo Thông tư 06/2025/TT-BCT: Khoảng cách an toàn tối thiểu khi làm việc gần thiết bị mang điện 110kV là:", 
     A: "1,0 m.", 
     B: "1,5 m.", 
     C: "2,0 m.", 
     D: "0,7 m.", 
     correct: "B" }
    // Lưu ý: Hãy copy toàn bộ các câu hỏi còn lại của bạn vào đây tương tự cấu trúc trên.
];

let activeQuestions = [];

function refreshLeaderboard() {
    const data60 = JSON.parse(localStorage.getItem('bxh_60')) || [];
    const data343 = JSON.parse(localStorage.getItem('bxh_343')) || [];

    document.getElementById('list-60').innerHTML = data60.map(i => `<tr><td>${i.name}</td><td>${i.score}/60</td></tr>`).join('');
    document.getElementById('list-343').innerHTML = data343.map(i => `<tr><td>${i.name}</td><td>${i.score}/${allQuestions.length}</td></tr>`).join('');
}

function initQuiz(count) {
    const name = document.getElementById('playerName').value.trim();
    if (!name) { alert("Vui lòng nhập tên trước khi làm bài!"); return; }

    document.getElementById('home-screen').style.display = 'none';
    document.getElementById('quiz-area').style.display = 'block';
    document.getElementById('mode-label').innerText = `CHẾ ĐỘ: ${count} CÂU`;
    
    // Trộn câu hỏi ngẫu nhiên
    activeQuestions = [...allQuestions].sort(() => 0.5 - Math.random()).slice(0, count);
    
    let html = '';
    activeQuestions.forEach((item, index) => {
        html += `
            <div class="question-block" id="block-${index}">
                <p><strong>Câu ${index + 1}:</strong> ${item.q}</p>
                <label class="ans-option"><input type="radio" name="q${index}" value="A"> A. ${item.A}</label>
                <label class="ans-option"><input type="radio" name="q${index}" value="B"> B. ${item.B}</label>
                <label class="ans-option"><input type="radio" name="q${index}" value="C"> C. ${item.C}</label>
                <label class="ans-option"><input type="radio" name="q${index}" value="D"> D. ${item.D}</label>
                <div id="res-${index}"></div>
            </div>
        `;
    });
    document.getElementById('questions-container').innerHTML = html;
    window.scrollTo(0, 0);
}

function finishQuiz() {
    let score = 0;
    activeQuestions.forEach((item, index) => {
        const selected = document.querySelector(`input[name="q${index}"]:checked`);
        const resDiv = document.getElementById(`res-${index}`);
        
        if (selected && selected.value === item.correct) {
            score++;
            resDiv.innerHTML = `<p class="correct-text">✓ Đúng!</p>`;
        } else {
            resDiv.innerHTML = `<p class="wrong-text">✗ Sai. Đáp án đúng: ${item.correct}</p>`;
        }
    });

    const name = document.getElementById('playerName').value.trim() || "Ẩn danh";
    const total = activeQuestions.length;
    const key = total === 60 ? 'bxh_60' : 'bxh_343';

    // Lưu vào localStorage
    let bxh = JSON.parse(localStorage.getItem(key)) || [];
    bxh.push({ name, score });
    bxh.sort((a, b) => b.score - a.score);
    localStorage.setItem(key, JSON.stringify(bxh.slice(0, 7))); // Giữ Top 7

    document.getElementById('final-result').innerHTML = `KẾT QUẢ: ${score} / ${total}`;
    refreshLeaderboard();
    alert(`Bạn đã hoàn thành bài thi với số điểm: ${score}/${total}`);
}

function clearData() {
    if (confirm("Bạn có chắc muốn xóa toàn bộ lịch sử điểm số trên bảng xếp hạng?")) {
        localStorage.removeItem('bxh_60');
        localStorage.removeItem('bxh_343');
        refreshLeaderboard();
    }
}

function goHome() {
    if (confirm("Quay lại màn hình chính?")) {
        document.getElementById('home-screen').style.display = 'block';
        document.getElementById('quiz-area').style.display = 'none';
    }
}

// Chạy lần đầu
refreshLeaderboard();
</script>

</body>
</html>
