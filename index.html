# Trang Thi Thử HTML/CSS/JavaScript

```html
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ÔN THI A3 - ĐẮKRE2</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, Helvetica, sans-serif;
    }

    body{
        background:#f3f3f3;
        padding:20px;
        color:#222;
    }

    .container{
        max-width:1100px;
        margin:auto;
    }

    h1{
        text-align:center;
        margin-bottom:20px;
        color:#000;
    }

    .top-bar{
        display:flex;
        justify-content:space-between;
        align-items:center;
        margin-bottom:20px;
        flex-wrap:wrap;
        gap:10px;
    }

    .online{
        font-size:18px;
        font-weight:bold;
    }

    .menu{
        text-align:center;
        margin-bottom:30px;
    }

    input[type="text"]{
        width:300px;
        padding:10px;
        border:1px solid #bbb;
        border-radius:6px;
        margin-bottom:15px;
    }

    button{
        padding:12px 20px;
        border:none;
        border-radius:6px;
        cursor:pointer;
        background:#1565c0;
        color:white;
        font-size:15px;
        margin:5px;
        transition:0.3s;
    }

    button:hover{
        background:#0d47a1;
    }

    .leaderboards{
        display:flex;
        gap:20px;
        margin-top:20px;
        flex-wrap:wrap;
    }

    .board{
        flex:1;
        min-width:300px;
        background:white;
        padding:20px;
        border-radius:12px;
        box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    .board h2{
        text-align:center;
        margin-bottom:15px;
    }

    table{
        width:100%;
        border-collapse:collapse;
    }

    table th,
    table td{
        border:1px solid #ccc;
        padding:10px;
        text-align:center;
    }

    .quiz-container{
        display:none;
        background:white;
        padding:25px;
        border-radius:12px;
        margin-top:30px;
        box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    .question-box{
        margin-bottom:25px;
        border:1px solid #ccc;
        padding:15px;
        border-radius:10px;
    }

    .question-title{
        font-weight:bold;
        margin-bottom:10px;
    }

    .option{
        margin:8px 0;
    }

    .submit-area{
        text-align:center;
        margin-top:20px;
    }

    .result{
        text-align:center;
        font-size:24px;
        font-weight:bold;
        margin-top:20px;
        color:green;
    }

    @media(max-width:768px){
        input[type="text"]{
            width:100%;
        }

        .leaderboards{
            flex-direction:column;
        }
    }
</style>
</head>
<body>

<div class="container">

    <div class="top-bar">
        <div class="online">👥 Online: <span id="onlineCount">6</span></div>
    </div>

    <h1>ÔN THI A3 - ĐẮKRE2</h1>

    <div class="menu">
        <input type="text" id="userName" placeholder="Nhập tên thí sinh...">
        <br>

        <button onclick="startQuiz(5)">📝 Làm 5 câu</button>
        <button onclick="startQuiz(10)">📚 Làm 10 câu</button>
        <button onclick="resetBXH()">🧹 Reset BXH</button>
    </div>

    <div class="leaderboards">

        <div class="board">
            <h2>🏆 BXH</h2>

            <table>
                <thead>
                    <tr>
                        <th>Tên</th>
                        <th>Điểm</th>
                    </tr>
                </thead>

                <tbody id="leaderboardBody">

                </tbody>
            </table>
        </div>

    </div>


    <div class="quiz-container" id="quizContainer">

        <div id="quizArea"></div>

        <div class="submit-area">
            <button onclick="submitQuiz()">📤 Nộp bài</button>
            <button onclick="reloadQuiz()">🔄 Làm lại</button>
        </div>

        <div class="result" id="result"></div>

    </div>

</div>

<script>

const questionBank = [
    {
        question: "Theo Thông tư 06/2025/TT-BCT: Thời gian tối đa để hoàn thành việc báo cáo nhanh sự cố bằng văn bản là bao lâu?",
        options: ["12 giờ", "24 giờ", "48 giờ", "08 giờ"],
        answer: 1
    },

    {
        question: "Phương án nào dùng để ngăn ngừa sự cố lan rộng?",
        options: ["Sa thải phụ tải", "Tách đảo hệ thống", "Cấp điện kịp thời", "Tất cả đáp án trên"],
        answer: 3
    },

    {
        question: "Nhân viên vận hành phải được diễn tập xử lý sự cố ít nhất?",
        options: ["1 tháng/lần", "6 tháng/lần", "1 năm/lần", "2 năm/lần"],
        answer: 2
    },

    {
        question: "Relay F87T là chức năng gì?",
        options: ["Quá dòng", "So lệch MBA", "Khoảng cách", "Tần số"],
        answer: 1
    },

    {
        question: "PLC viết tắt của từ gì?",
        options: ["Programmable Logic Controller", "Power Line Control", "Program Line CPU", "Power Logic CPU"],
        answer: 0
    },

    {
        question: "Giao thức Modbus thường dùng cổng nào?",
        options: ["80", "21", "502", "25"],
        answer: 2
    },

    {
        question: "RED670 là relay của hãng nào?",
        options: ["Siemens", "ABB", "Schneider", "GE"],
        answer: 1
    },

    {
        question: "Thiết bị dùng để biến đổi điện áp AC sang DC?",
        options: ["Inverter", "Rectifier", "UPS", "Contactor"],
        answer: 1
    },

    {
        question: "Dòng điện 3 pha có góc lệch giữa các pha là bao nhiêu?",
        options: ["60°", "90°", "120°", "180°"],
        answer: 2
    },

    {
        question: "Chức năng F25 trong relay là gì?",
        options: ["Đồng bộ", "Quá áp", "So lệch", "Khoảng cách"],
        answer: 0
    }
];

let currentQuestions = [];

function shuffleArray(array){
    return array.sort(() => Math.random() - 0.5);
}

function startQuiz(number){

    const name = document.getElementById("userName").value.trim();

    if(name === ""){
        alert("Vui lòng nhập tên thí sinh!");
        return;
    }

    document.getElementById("quizContainer").style.display = "block";

    currentQuestions = shuffleArray([...questionBank]).slice(0, number);

    renderQuestions();
}

function renderQuestions(){

    const quizArea = document.getElementById("quizArea");

    quizArea.innerHTML = "";

    currentQuestions.forEach((q, index) => {

        let html = `
            <div class="question-box">
                <div class="question-title">
                    Câu ${index + 1}: ${q.question}
                </div>
        `;

        q.options.forEach((opt, i) => {
            html += `
                <div class="option">
                    <label>
                        <input type="radio" name="question${index}" value="${i}">
                        ${String.fromCharCode(65 + i)}. ${opt}
                    </label>
                </div>
            `;
        });

        html += `</div>`;

        quizArea.innerHTML += html;
    });

    document.getElementById("result").innerHTML = "";
}

function submitQuiz(){

    let score = 0;

    currentQuestions.forEach((q, index) => {

        const selected = document.querySelector(`input[name="question${index}"]:checked`);

        if(selected){
            if(parseInt(selected.value) === q.answer){
                score++;
            }
        }
    });

    document.getElementById("result").innerHTML = `Bạn đạt ${score}/${currentQuestions.length} điểm`;

    saveLeaderboard(score, currentQuestions.length);
}

function saveLeaderboard(score, total){

    const name = document.getElementById("userName").value.trim();

    let data = JSON.parse(localStorage.getItem("leaderboard")) || [];

    data.push({
        name:name,
        score:score,
        total:total
    });

    data.sort((a,b) => b.score - a.score);

    localStorage.setItem("leaderboard", JSON.stringify(data));

    loadLeaderboard();
}

function loadLeaderboard(){

    const data = JSON.parse(localStorage.getItem("leaderboard")) || [];

    const body = document.getElementById("leaderboardBody");

    body.innerHTML = "";

    data.slice(0,10).forEach(item => {

        body.innerHTML += `
            <tr>
                <td>${item.name}</td>
                <td>${item.score}/${item.total}</td>
            </tr>
        `;
    });
}

function resetBXH(){

    if(confirm("Bạn có chắc muốn xóa bảng xếp hạng?")){
        localStorage.removeItem("leaderboard");
        loadLeaderboard();
    }
}

function reloadQuiz(){
    renderQuestions();
}

loadLeaderboard();

</script>

</body>
</html>
