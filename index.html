<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>ÔN THI A3-ĐĂKRE2</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f9f9f9; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; text-align: center; }
        
        h2 { text-transform: uppercase; margin-bottom: 30px; }
        
        /* Menu & Buttons */
        .menu-buttons { margin-bottom: 30px; }
        button { 
            padding: 10px 20px; margin: 5px; cursor: pointer; 
            border: 1px solid #999; background: #eee; font-weight: bold;
            border-radius: 4px; transition: 0.3s;
        }
        button:hover { background: #ddd; }
        
        /* Search Box */
        .search-box { margin-bottom: 20px; }
        input[type="text"] { padding: 8px; width: 250px; border: 1px solid #ccc; border-radius: 4px; }

        /* Leaderboard Tables */
        .leaderboard-container { display: flex; justify-content: space-around; gap: 20px; flex-wrap: wrap; }
        .bxh-card { 
            background: white; border: 1px solid #ddd; border-radius: 8px; 
            padding: 15px; width: 45%; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .bxh-title { font-weight: bold; margin-bottom: 15px; font-size: 1.1em; }
        .bxh-title span { color: #f39c12; }

        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background-color: #f2f2f2; }

        /* Quiz Area */
        #quiz-section { display: none; text-align: left; background: white; padding: 20px; border-radius: 8px; border: 1px solid #ddd; }
        .question-item { margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #eee; }
        .options-label { display: block; margin: 8px 0; cursor: pointer; }
        
        .result-correct { color: green; font-weight: bold; }
        .result-wrong { color: red; font-weight: bold; }
        
        .top-panel { position: sticky; top: 0; background: white; padding: 10px; border-bottom: 2px solid #333; z-index: 100; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

<div class="container" id="main-menu">
    <p>👤 <strong>Online: 1</strong></p>
    <h2>ÔN THI A3-ĐĂKRE2</h2>

    <div class="search-box">
        <input type="text" placeholder="Nhập tên thí sinh...">
    </div>

    <div class="menu-buttons">
        <button onclick="startQuiz(60)">📝 Làm 60 câu</button>
        <button onclick="startQuiz(originalQuiz.length)">📚 Làm 343 câu</button>
        <button onclick="resetBXH()">🧹 Reset BXH</button>
    </div>

  <div class="leaderboard-container">
    <!-- BXH 60 Câu -->
    <div class="bxh-card">
        <div class="bxh-title">🏆 BXH 60 CÂU</div>
        <table>
            <thead>
                <tr><th>Tên</th><th>Điểm</th></tr>
            </thead>
            <tbody id="bxh-60-body">
                <!-- Dữ liệu sẽ tự động đổ vào đây -->
            </tbody>
        </table>
    </div>

    <!-- BXH 343 Câu -->
    <div class="bxh-card">
        <div class="bxh-title">🏆 BXH 343 CÂU</div>
        <table>
            <thead>
                <tr><th>Tên</th><th>Điểm</th></tr>
            </thead>
            <tbody id="bxh-343-body">
                <!-- Dữ liệu sẽ tự động đổ vào đây -->
            </tbody>
        </table>
    </div>
</div>

<!-- Giao diện làm bài -->
<div id="quiz-section" class="container">
    <div class="top-panel">
        <h3 id="quiz-title">ĐANG LÀM BÀI</h3>
        <div>
            <button onclick="submitQuiz()" style="background: #27ae60; color: white;">📤 Nộp bài</button>
            <button onclick="exitQuiz()">🏠 Thoát</button>
        </div>
    </div>
    <div id="quiz-content"></div>
    <div id="final-score" style="font-size: 24px; font-weight: bold; margin-top: 20px; color: #2c3e50;"></div>
</div>

<script>
// Dữ liệu câu hỏi của bạn (giữ nguyên mảng originalQuiz bạn đã gửi)
const originalQuiz = [
    {
        q: "Theo Thông tư 05/2025/TT-BCT: Tổ máy phát điện của nhà máy thủy điện và nhà máy nhiệt điện có tổng công suất lắp đặt từ 30 MW trở xuống đấu nối vào lưới điện phân phối phải có khả năng phát công suất tác dụng định mức liên tục trong dải tần số của hệ thống điện",
        A: "48 Hz đến 50 Hz.", 
        B: "48 Hz đến 51 Hz.", 
        C: "49 Hz đến 50 Hz.", 
        D: "49 Hz đến 51 Hz.",
        correct: "D"
    },
    {
        q: "Theo Thông tư 06/2025/TT-BCT: Điều khiển tần số thứ cấp nhằm duy trì tần số ở dải tần số làm việc cho phép nào?",
        A: "50 +- 0,1 Hz", 
      B: "50 +- 0,5 Hz", 
      C: "50 +- 0,02 Hz",
      D: "50 +- 0,2 Hz",
        correct: "D"
    },
    // ... Thêm các câu hỏi khác vào đây
];

let currentQuestions = [];

function startQuiz(num) {
    document.getElementById('main-menu').style.display = 'none';
    document.getElementById('quiz-section').style.display = 'block';
    document.getElementById('quiz-title').innerText = `ÔN THI: ${num} CÂU`;
    
    // Trộn ngẫu nhiên và lấy số lượng câu hỏi yêu cầu
    currentQuestions = [...originalQuiz].sort(() => 0.5 - Math.random()).slice(0, num);
    
    let html = '';
    currentQuestions.forEach((item, index) => {
        html += `
            <div class="question-item" id="q-container-${index}">
                <p><strong>Câu ${index + 1}:</strong> ${item.q}</p>
                <label class="options-label"><input type="radio" name="q${index}" value="A"> A. ${item.A}</label>
                <label class="options-label"><input type="radio" name="q${index}" value="B"> B. ${item.B}</label>
                <label class="options-label"><input type="radio" name="q${index}" value="C"> C. ${item.C}</label>
                <label class="options-label"><input type="radio" name="q${index}" value="D"> D. ${item.D}</label>
                <div id="feedback-${index}"></div>
            </div>
        `;
    });
    document.getElementById('quiz-content').innerHTML = html;
    document.getElementById('final-score').innerHTML = '';
}

function submitQuiz() {
    let score = 0;
    currentQuestions.forEach((item, index) => {
        const selected = document.querySelector(`input[name="q${index}"]:checked`);
        const feedback = document.getElementById(`feedback-${index}`);
        
        if (selected) {
            if (selected.value === item.correct) {
                score++;
                feedback.innerHTML = `<span class="result-correct">Chính xác!</span>`;
            } else {
                feedback.innerHTML = `<span class="result-wrong">Sai. Đáp án đúng là: ${item.correct}</span>`;
            }
        } else {
            feedback.innerHTML = `<span class="result-wrong">Chưa trả lời. Đáp án đúng là: ${item.correct}</span>`;
        }
    });
    
    document.getElementById('final-score').innerHTML = `KẾT QUẢ: ${score} / ${currentQuestions.length}`;
    window.scrollTo(0, document.body.scrollHeight);
}

function exitQuiz() {
    if(confirm("Bạn có chắc muốn thoát? Kết quả sẽ không được lưu.")) {
        document.getElementById('main-menu').style.display = 'block';
        document.getElementById('quiz-section').style.display = 'none';
    }
}

function resetBXH() {
    alert("Bảng xếp hạng đã được đặt lại (giả lập).");
}
</script>

</body>
</html>
